<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 300px;
            width: 300px;
            background-color: rgb(255, 34, 0);
            display: flex;
            justify-content:space-evenly;
            align-items: center;
        }
        .box{
            height: 50px;
            width: 50px;
            /* background-color: white; */
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* box-shadow: 0px 0px 10px rgb(67, 67, 67); */
        }
        .box1{
            height: 95%;
            width: 45%;
            /* background-color: antiquewhite; */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .box2{
            height: 95%;
            width: 45%;
            /* background-color: aquamarine; */
        }

        .box3{
            height: 48%;
            width: 95%;
            background-color: aquamarine;
        }
        .box4{
            height: 48%;
            width: 45%;
            background-color: rgb(255, 0, 255);
        }
        .box5{
            height: 100%;
            width: 100%;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1 box">
            <div class="box3 box"></div>
            <div class="box3 box"></div>
        </div>
        
        <div class="box2 box">
            <div class="box5 box"> </div>
        </div>
        
    </div>
</body>
</html>
