<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let day = 3

        switch (day){
            case 1:
                console.log("mon");
                break;
            case 2:
                console.log("tue");
                break;
            case 3:
                console.log("wed");
                break;
            case 4:
                console.log("thr");
                break;
            default:
                console.log("Invalid day")
        }
    </script>
</body>
</html>
